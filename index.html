<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>TSV Einlasskontrolle</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; transition: background 0.3s; min-height: 100vh; overflow-x: hidden; background: #f4f4f4; }
    #header { padding: 15px; background: #515a6d; color: white; font-weight: bold; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
    
    /* Eingabebereich */
    .input-section { background: white; padding: 10px; border-bottom: 2px solid #ddd; }
    #reader { width: 100%; max-width: 350px; margin: 5px auto; border-radius: 12px; overflow: hidden; border: 3px solid #ccc; background: #000; }
    
    /* Statusbereich */
    #status-section { padding: 20px; min-height: 80px; transition: all 0.3s; }
    #result-text { font-size: 2.2em; font-weight: bold; line-height: 1.1; margin-bottom: 10px; }
    #hint-box { background: rgba(255,255,255,0.3); padding: 15px; border-radius: 12px; font-size: 1.4em; font-weight: bold; display: none; margin: 10px auto; max-width: 600px; border: 3px solid white; animation: blinker 1.5s linear infinite; }
    
    /* Optionsbereich (Unten abgetrennt) */
    #option-section { display: none; margin-top: 10px; padding: 20px; background: #e9ecef; border-top: 2px solid #ced4da; }
    .current-name-label { font-size: 0.9em; color: #666; text-transform: uppercase; margin-bottom: 5px; display: block; }
    .current-name-display { font-size: 1.5em; font-weight: bold; color: #333; margin-bottom: 15px; display: block; }

    /* Buttons */
    .detail-btn { width: 100%; max-width: 300px; padding: 14px; background: #515a6d; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-bottom: 10px; font-size: 1em; }
    .admin-btn { width: 100%; max-width: 300px; padding: 12px; background: #888; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 0.9em; }
    .forgot-btn { width: 100%; max-width: 300px; padding: 8px; background: transparent; color: #666; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; font-size: 0.85em; margin-top: 10px; }
    
    /* Overlays & Rest */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; color: #333; z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    .overlay-content { max-width: 500px; margin: 0 auto; text-align: left; }
    .close-btn { float: right; font-size: 2.5em; cursor: pointer; padding: 0 10px; color: #515a6d; }
    input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ccc; font-size: 1.1em; margin-bottom: 10px; box-sizing: border-box; }
    button.main { padding: 12px 20px; background: #515a6d; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    
    .idle { background: #f4f4f4; color: #333; }
    .success { background: #28a745; color: white; }
    .blue { background: #007bff; color: white; }
    .yellow { background: #ffc107; color: #333; }
    .error { background: #dc3545; color: white; }
    
    @keyframes blinker { 50% { opacity: 0.5; } }
  </style>
</head>
<body class="idle">
  <div id="header">
    <span>TSV EINLASSKONTROLLE</span>
    <button style="padding: 8px 12px; background: #d1d8e2; color: #515a6d; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8em; font-weight: bold;" onclick="showTodayAttendance()">👥 Gruppen</button>
  </div>

  <div class="input-section">
    <div id="reader"></div>
    <div style="margin: 10px 0;">
      <input type="text" id="manualId" placeholder="Manuelle ID..." inputmode="numeric" style="width:120px; margin-bottom:0;">
      <button class="main" onclick="checkManual()">Check</button>
    </div>
    <button class="forgot-btn" onclick="openSearch()">Ausweis vergessen / Suche</button>
  </div>

  <div id="status-section">
    <div id="loader-container" style="display:none; height:4px; background:#ddd; margin-bottom:10px;"><div id="loader-bar" style="width:100%; height:100%; background:#007bff;"></div></div>
    <div id="result-text">Bereit</div>
    <div id="hint-box"></div>
  </div>

  <div id="option-section">
    <span class="current-name-label">Aktuelles Mitglied</span>
    <span id="currentNameDisplay" class="current-name-display">-</span>
    <button id="detailBtn" class="detail-btn" onclick="openDetails()">Mitgliedsdaten anzeigen</button><br>
    <button id="adminBtn" class="admin-btn" onclick="openAdminOrder()">Verwaltungsauftrag erstellen</button>
  </div>

  <div id="history-wrapper" style="text-align: left; background: #fff; border-top: 1px solid #ccc;">
    <button onclick="toggleHistory()" style="width: 100%; padding: 12px; background: #f8f9fa; border: none; border-bottom: 1px solid #eee; font-weight: bold; cursor: pointer; color: #666; display: flex; justify-content: space-between;">
      <span>🕒 Letzte 10 Scans</span><span>▼</span>
    </button>
    <div id="history-content" style="display: none; max-height: 200px; overflow-y: auto;"><div id="history-list"></div></div>
  </div>

  <div id="detailOverlay" class="overlay"><div class="overlay-content">
      <span class="close-btn" onclick="closeOverlay('detailOverlay')">&times;</span>
      <h2 id="detName" style="color: #515a6d; border-bottom: 2px solid #515a6d;">Name</h2>
      <div style="background: #d1d8e2; padding: 15px; border-radius: 12px; margin: 15px 0;">
        <p><b>Geburtstag:</b> <span id="detDob">-</span></p>
        <p><b>Alter:</b> <span id="detAge">-</span></p>
        <p><b>Spond-Gruppen:</b><br><span id="detGroups">Lade...</span></p>
      </div>
      <div style="background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 12px;">
        <h3>Letzte Check-ins</h3>
        <div id="detHistory"></div>
        <button id="loadArchiveBtn" onclick="loadArchiveHistory()" style="margin-top:10px; width:100%; padding:8px;">+ Archiv laden</button>
      </div>
  </div></div>

  <div id="adminOverlay" class="overlay"><div class="overlay-content">
      <span class="close-btn" onclick="closeOverlay('adminOverlay')">&times;</span>
      <h2 style="color: #515a6d;">Verwaltungsauftrag</h2>
      <p id="adminMemberInfo" style="font-weight: bold; color: #666;"></p>
      <select id="orderType" onchange="updateOrderFields()">
        <option value="">-- Typ wählen --</option>
        <option value="Neuausstellung Ausweis">Neuausstellung Ausweis</option>
        <option value="Datenänderung">Datenänderung</option>
        <option value="Dokumente">Dokumente/Anträge</option>
        <option value="Vorfall">Vorfall melden</option>
        <option value="Sonstiges">Sonstiges</option>
      </select>
      <div id="dynamicFields"></div>
      <button class="main" id="sendOrderBtn" onclick="sendOrder()" style="width: 100%; margin-top: 20px; background: #28a745;">Auftrag senden</button>
  </div></div>

  <div id="searchOverlay" class="overlay"><div class="overlay-content">
      <span class="close-btn" onclick="closeOverlay('searchOverlay')">&times;</span>
      <h2>Mitglied suchen</h2>
      <input type="text" id="sVorname" placeholder="Vorname">
      <input type="text" id="sNachname" placeholder="Nachname">
      <input type="text" id="sGeburtstag" placeholder="Geburtstag (TT.MM.JJJJ)">
      <button class="main" onclick="runSearch()" style="width:100%">Suchen</button>
      <div id="searchResults" style="margin-top:20px;"></div>
  </div></div>

  <div id="groupOverlay" class="overlay"><div class="overlay-content">
      <span class="close-btn" onclick="closeOverlay('groupOverlay')">&times;</span>
      <h2>Gruppen heute</h2>
      <div id="totalCount" style="font-weight:bold; margin-bottom:15px;"></div>
      <div id="groupContent"></div>
  </div></div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIZ_jMTEP5uaZDbQ2n0FMoJxaHypMfxtXr8TPTd6LcOPJU2po58ZWQYwa_LKTlQ1d1gA/exec";
    let isLocked = false, currentMember = null, scanHistory = [];
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 220 }, (t) => processId(t));

    function handleResponse(res) {
      document.getElementById('loader-container').style.display = "none";
      const statusSec = document.getElementById('status-section');
      const optionSec = document.getElementById('option-section');
      
      if (res.found) {
        currentMember = res;
        updateHistory(res);
        
        // Optionsbereich einblenden und Namen setzen
        optionSec.style.display = "block";
        document.getElementById('currentNameDisplay').innerText = res.name;
        
        if (res.type === "hint") {
          statusSec.className = "yellow";
          document.getElementById('hint-box').innerText = "⚠️ " + res.hint;
          document.getElementById('hint-box').style.display = "block";
        } else {
          statusSec.className = (res.type === "trainer") ? "blue" : "success";
          document.getElementById('hint-box').style.display = "none";
        }
        document.getElementById('result-text').innerHTML = "✅ " + res.name;
      } else {
        statusSec.className = "error";
        document.getElementById('result-text').innerHTML = "❌ ungültig: " + res.id;
      }
      
      setTimeout(() => { 
        if(document.getElementById('result-text').innerText !== "Lädt...") { 
          statusSec.className = "idle"; 
          document.getElementById('result-text').innerText = "Bereit"; 
          document.getElementById('hint-box').style.display = "none"; 
        } 
      }, 5000);
    }

    function processId(id) {
      if (!id || isLocked) return;
      isLocked = true; setTimeout(() => isLocked = false, 1200);
      document.getElementById('status-section').className = "idle";
      document.getElementById('result-text').innerText = "Lädt...";
      document.getElementById('loader-container').style.display = "block";
      fetch(`${SCRIPT_URL}?id=${id}`).then(r => r.json()).then(handleResponse);
    }

    // --- FUNKTIONEN FÜR OVERLAYS ---
    function openDetails() {
      if (!currentMember) return;
      document.getElementById('detName').innerText = "Lade...";
      document.getElementById('detailOverlay').style.display = "block";
      fetch(`${SCRIPT_URL}?action=details&id=${currentMember.id}&vn=${currentMember.firstName}&nn=${currentMember.lastName}`)
        .then(r => r.json()).then(d => {
          document.getElementById('detName').innerText = currentMember.name;
          document.getElementById('detDob').innerText = d.dob;
          document.getElementById('detAge').innerText = d.age + " Jahre";
          document.getElementById('detGroups').innerText = d.groups.join(', ') || "Keine";
          document.getElementById('detHistory').innerHTML = d.history.join('<br>');
        });
    }

    function openAdminOrder() {
      if (!currentMember) return;
      document.getElementById('adminMemberInfo').innerText = "Auftrag für: " + currentMember.name;
      document.getElementById('adminOverlay').style.display = "block";
    }

    function updateOrderFields() {
      const type = document.getElementById('orderType').value;
      const container = document.getElementById('dynamicFields');
      let html = "";
      if (type === "Neuausstellung Ausweis") {
        html = `<select id="fFee"><option value="5,00 EUR">Standard (5,00 EUR)</option><option value="gebührenfrei">Gebührenfrei</option></select><textarea id="fNote" placeholder="Bemerkung"></textarea>`;
      } else if (type === "Datenänderung") {
        html = `<input type="text" id="fVal" placeholder="Was soll geändert werden? (Name, Adresse, Tel...)"><textarea id="fNote" placeholder="Neue Daten hier eintragen"></textarea>`;
      } else if (type === "Dokumente") {
        html = `<input type="text" id="fDoc" placeholder="Welches Dokument?"><textarea id="fNote" placeholder="Details"></textarea>`;
      } else if (type === "Vorfall") {
        html = `<input type="text" id="fSubject" placeholder="Betreff"><textarea id="fNote" placeholder="Beschreibung (Wer, Wann, Wo, Was)"></textarea>`;
      } else if (type === "Sonstiges") {
        html = `<input type="text" id="fSubject" placeholder="Betreff"><textarea id="fNote" placeholder="Anliegen"></textarea>`;
      }
      container.innerHTML = html;
    }

    function sendOrder() {
      const type = document.getElementById('orderType').value;
      if(!type) return alert("Typ wählen!");
      const btn = document.getElementById('sendOrderBtn');
      btn.disabled = true; btn.innerText = "Sende...";
      let details = "";
      document.getElementById('dynamicFields').querySelectorAll('input, select, textarea').forEach(f => { details += (f.placeholder || "Info") + ": " + f.value + "\n"; });
      const payload = { memberId: currentMember.id, memberName: currentMember.name, type: type, details: details };
      fetch(SCRIPT_URL + "?action=adminOrder", { method: 'POST', body: JSON.stringify(payload) })
        .then(() => { alert("Gesendet!"); closeOverlay('adminOverlay'); btn.disabled = false; btn.innerText = "Auftrag senden"; });
    }

    function runSearch() {
      const vn = document.getElementById('sVorname').value, nn = document.getElementById('sNachname').value, dob = document.getElementById('sGeburtstag').value;
      document.getElementById('searchResults').innerHTML = "Suche...";
      fetch(`${SCRIPT_URL}?action=search&vn=${vn}&nn=${nn}&dob=${dob}`).then(r => r.json()).then(res => {
        document.getElementById('searchResults').innerHTML = res.map(r => `<div style="padding:10px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; align-items:center;"><div><b>${r.name}</b><br><small>${r.dob}</small></div><button class="main" style="padding:5px 10px;" onclick="manualCheckIn('${r.id}')">Wählen</button></div>`).join('');
      });
    }

    function manualCheckIn(id) { closeOverlay('searchOverlay'); processId(id); }
    function showTodayAttendance() { 
      document.getElementById('groupOverlay').style.display = "block"; 
      fetch(`${SCRIPT_URL}?action=getTodayAttendance`).then(r => r.json()).then(data => {
        document.getElementById('totalCount').innerText = "Gesamt: " + data.total;
        let h = ""; for (let g in data.groups) h += `<b>${g} (${data.groups[g].length})</b><br><small>${data.groups[g].join(', ')}</small><br><br>`;
        document.getElementById('groupContent').innerHTML = h;
      });
    }

    function closeOverlay(id) { document.getElementById(id).style.display = "none"; }
    function toggleHistory() { const c = document.getElementById('history-content'); c.style.display = (c.style.display === "block") ? "none" : "block"; }
    function updateHistory(res) { scanHistory.unshift(res); if (scanHistory.length > 10) scanHistory.pop(); document.getElementById('history-list').innerHTML = scanHistory.map(item => `<div style="padding:8px; border-bottom:1px solid #eee; font-size:0.9em;"><b>#${item.id}</b> ${item.name}</div>`).join(''); }
    function checkManual() { processId(document.getElementById('manualId').value); }
  </script>
</body>
</html>
