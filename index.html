<!DOCTYPE html> 
<html> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"> 
  <title>TSV Einlass</title> 
  <style> 
    body { font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; background: #f4f4f4; } 
    #status-area { transition: background 0.3s; padding-bottom: 20px; border-bottom: 2px solid #ddd; }
    #header { padding: 15px; background: #515a6d; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; } 
    #reader { width: 100%; max-width: 400px; margin: 10px auto; border-radius: 12px; overflow: hidden; border: 4px solid #ccc; background: #000; } 
    #result-text { font-size: 2.2em; font-weight: bold; padding: 10px; } 

    /* Unterer Verwaltungsbereich */
    #admin-section { display: none; background: #fff; padding: 25px; text-align: center; }
    .current-name { font-size: 1.8em; font-weight: bold; margin-bottom: 15px; display: block; color: #515a6d; }
    .action-btn { width: 90%; max-width: 320px; padding: 15px; background: #515a6d; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    
    .forgot-btn { width: 80%; padding: 12px; background: #ffcc00; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; text-align: left; }
    .close-btn { float: right; font-size: 2.5em; cursor: pointer; }
    
    .success { background: #28a745 !important; color: white; } 
    .error { background: #dc3545 !important; color: white; } 
    .idle { background: #f4f4f4; }
    
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #515a6d; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
  </style> 
</head> 
<body class="idle"> 

  <div id="status-area">
    <div id="header"> 
      <span>TSV EINLASS</span> 
      <button onclick="showTodayAttendance()" style="padding:8px; border-radius:5px; border:none; font-weight:bold;">👥 Gruppen</button> 
    </div> 
    <div id="reader"></div> 
    <div id="result-text">Bereit</div> 
    <input type="text" id="manualId" placeholder="ID eingeben..." style="width:120px;">
    <button onclick="checkManual()" style="padding:12px; background:#515a6d; color:white; border-radius:8px; border:none;">OK</button><br>
    <button class="forgot-btn" onclick="document.getElementById('searchOverlay').style.display='block'">🔎 AUSWEIS VERGESSEN</button> 
  </div>

  <div id="admin-section">
    <span class="current-name" id="curName">-</span>
    <button class="action-btn" onclick="openDetails()">Mitgliedsdaten anzeigen</button><br>
    <button class="action-btn" style="background:#888;" onclick="openOrder()">Verwaltungsauftrag erstellen</button>
  </div>

  <div id="searchOverlay" class="overlay">
    <span class="close-btn" onclick="this.parentElement.style.display='none'">&times;</span>
    <h2>Mitglied suchen</h2>
    <input type="text" id="sVN" placeholder="Vorname">
    <input type="text" id="sNN" placeholder="Nachname">
    <button class="action-btn" onclick="runSearch()">Suchen</button>
    <div id="searchResults"></div>
  </div>

  <div id="orderOverlay" class="overlay">
    <span class="close-btn" onclick="this.parentElement.style.display='none'">&times;</span>
    <h2>Verwaltungsauftrag</h2>
    <select id="orderType" onchange="renderOrderForm()">
      <option value="">-- Auftrag wählen --</option>
      <option value="Neuausstellung">1. Neuausstellung Ausweis</option>
      <option value="Datenänderung">2. Datenänderung</option>
      <option value="Dokumente">3. Ausstellung von Dokumenten</option>
      <option value="Vorfall">4. Vorfall melden</option>
      <option value="Sonstiges">5. Sonstiges Anliegen</option>
    </select>
    <div id="orderForm"></div>
    <button id="sendBtn" class="action-btn" style="background:#28a745; display:none;" onclick="sendOrder()">Auftrag senden</button>
  </div>

  <div id="groupOverlay" class="overlay">
    <span class="close-btn" onclick="this.parentElement.style.display='none'">&times;</span>
    <h2 id="gTitle">Anwesenheit</h2>
    <div id="gContent"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script> 
  <script> 
    const SCRIPT_URL = "DEINE_URL"; 
    let currentMember = null;
    const html5QrCode = new Html5Qrcode("reader"); 
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (t) => processId(t)); 

    function processId(id) { 
      if (!id) return;
      document.getElementById('result-text').innerText = "Prüfe..."; 
      fetch(`${SCRIPT_URL}?id=${id}`).then(r => r.json()).then(res => {
        const area = document.getElementById('status-area');
        if (res.found) {
          currentMember = res;
          area.className = "success";
          document.getElementById('result-text').innerText = "✅ " + res.name;
          document.getElementById('admin-section').style.display = "block";
          document.getElementById('curName').innerText = res.name;
        } else {
          area.className = "error";
          document.getElementById('result-text').innerText = "❌ Unbekannt";
        }
        setTimeout(() => { area.className = "idle"; document.getElementById('result-text').innerText = "Bereit"; }, 3000);
      });
    }

    function runSearch() {
      const vn = document.getElementById('sVN').value, nn = document.getElementById('sNN').value;
      document.getElementById('searchResults').innerHTML = "Suche...";
      fetch(`${SCRIPT_URL}?action=search&vn=${vn}&nn=${nn}`).then(r => r.json()).then(res => {
        document.getElementById('searchResults').innerHTML = res.map(m => 
          `<div style="padding:10px; border-bottom:1px solid #eee;">${m.name} <button onclick="manualIn('${m.id}')">Check-In</button></div>`).join('');
      });
    }

    function manualIn(id) { document.getElementById('searchOverlay').style.display='none'; processId(id); }
    function checkManual() { processId(document.getElementById('manualId').value); }

    function openOrder() { document.getElementById('orderOverlay').style.display='block'; }

    function renderOrderForm() {
      const type = document.getElementById('orderType').value;
      const form = document.getElementById('orderForm');
      document.getElementById('sendBtn').style.display = "block";
      let html = "";
      if (type === "Neuausstellung") {
        html = `<select id="f1"><option>Kostenpflichtig (5,00€)</option><option>Gebührenfrei (Kulanz)</option></select><textarea id="f2" placeholder="Bemerkung"></textarea>`;
      } else if (type === "Datenänderung") {
        html = `<input id="f1" placeholder="Neuer Name"><input id="f2" placeholder="Straße/Hausnr."><input id="f3" placeholder="PLZ/Ort"><input id="f4" placeholder="Tel/Email"><textarea id="f5" placeholder="Bemerkung"></textarea>`;
      } else if (type === "Dokumente") {
        html = `<select id="f1"><option>Bestätigung Mitgliedschaft</option><option>Antrag Bildung & Teilhabe</option><option>Sonstiger Antrag (siehe Bemerkung)</option></select><textarea id="f2" placeholder="Bemerkung"></textarea>`;
      } else if (type === "Vorfall") {
        html = `<input id="f1" placeholder="Betreff"><input id="f2" placeholder="Zeitpunkt"><input id="f3" placeholder="Ort"><textarea id="f4" placeholder="Beteiligte Personen / Beschreibung"></textarea>`;
      } else if (type === "Sonstiges") {
        html = `<select id="f1"><option>Mitgliedschaft</option><option>Kündigung</option><option>Beiträge</option><option>Aktivenumlage</option><option>Sonstiges</option></select><input id="f2" placeholder="Betreff"><textarea id="f3" placeholder="Freitext"></textarea>`;
      }
      form.innerHTML = html;
    }

    function sendOrder() {
      const type = document.getElementById('orderType').value;
      const inputs = document.getElementById('orderForm').querySelectorAll('input, select, textarea');
      let details = "";
      inputs.forEach(i => details += i.placeholder + ": " + i.value + "\n");
      fetch(SCRIPT_URL + "?action=adminOrder", { method: 'POST', body: JSON.stringify({memberId: currentMember.id, memberName: currentMember.name, type: type, details: details}) })
      .then(() => { alert("Auftrag gesendet!"); document.getElementById('orderOverlay').style.display='none'; });
    }

    function showTodayAttendance() {
      document.getElementById('groupOverlay').style.display='block';
      document.getElementById('gContent').innerHTML = "Lade...";
      fetch(`${SCRIPT_URL}?action=getTodayAttendance`).then(r => r.json()).then(res => {
        document.getElementById('gTitle').innerText = "Anwesend (" + res.total + ")";
        document.getElementById('gContent').innerHTML = res.groups["Anwesend"] ? res.groups["Anwesend"].map(n => `<div>${n}</div>`).sort().join('') : "Keine heute.";
      });
    }
  </script> 
</body> 
</html>
